<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toán THCS - Thầy Phúc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
      // MathJax Configuration
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']]
        },
        svg: {
          fontCache: 'global'
        }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Nunito', 'sans-serif'],
            },
            colors: {
              teal: {
                50: '#f0fdfa',
                100: '#ccfbf1',
                200: '#99f6e4',
                300: '#5eead4',
                400: '#2dd4bf',
                500: '#14b8a6',
                600: '#0d9488',
                700: '#0f766e',
                800: '#115e59',
                900: '#134e4a',
              }
            },
            animation: {
              'bounce-small': 'bounce-small 1s infinite',
            },
            keyframes: {
              'bounce-small': {
                '0%, 100%': { transform: 'translateY(-5%)' },
                '50%': { transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Nunito', sans-serif;
      }
      /* Custom scrollbar for better aesthetics */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1; 
      }
      ::-webkit-scrollbar-thumb {
        background: #0d9488; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #0f766e; 
      }
      /* MathJax specific adjustments */
      mjx-container {
        display: inline-grid !important;
        margin: 0 2px !important;
      }
      
      /* Coin Flip Animation Classes */
      .coin-container {
        perspective: 1000px;
      }
      .coin {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 1s ease-out;
      }
      .coin.heads {
        transform: rotateY(0deg);
      }
      .coin.tails {
        transform: rotateY(180deg);
      }
      .coin.flipping-heads {
        animation: flipHeads 1s ease-out forwards;
      }
      .coin.flipping-tails {
        animation: flipTails 1s ease-out forwards;
      }
      
      .side {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 50%;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }
      .side-back {
        transform: rotateY(180deg);
      }

      @keyframes flipHeads {
        0% { transform: rotateY(0); }
        100% { transform: rotateY(1800deg); } 
      }
      @keyframes flipTails {
        0% { transform: rotateY(0); }
        100% { transform: rotateY(1980deg); } 
      }

      /* 3D Dice Styles */
      .dice-scene {
        perspective: 600px;
      }
      .cube {
        width: 100px;
        height: 100px;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 1s ease-out;
      }
      
      /* Standard Face Positions */
      .cube-face {
        position: absolute;
        width: 100px;
        height: 100px;
        background: linear-gradient(145deg, #ef4444, #dc2626); /* Red */
        border: 2px solid #b91c1c;
        border-radius: 16px;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
      }
      
      .cube-face-1 { transform: rotateY(0deg) translateZ(50px); }
      .cube-face-2 { transform: rotateX(-90deg) translateZ(50px); }
      .cube-face-3 { transform: rotateY(90deg) translateZ(50px); }
      .cube-face-4 { transform: rotateY(-90deg) translateZ(50px); }
      .cube-face-5 { transform: rotateX(90deg) translateZ(50px); }
      .cube-face-6 { transform: rotateY(180deg) translateZ(50px); }

      /* Dot Styling */
      .dot {
        width: 18px;
        height: 18px;
        background-color: white;
        border-radius: 50%;
        box-shadow: inset 0 2px 2px rgba(0,0,0,0.2);
      }
      
      /* Dot Layouts using Grid */
      .face-content {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        width: 70%;
        height: 70%;
        padding: 2px;
      }
      
      /* Animation Class */
      .rolling {
        animation: rollDice 0.6s linear infinite;
      }
      
      @keyframes rollDice {
        0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
        100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
      }

    </style>
  
</head>
  <body class="bg-teal-50 text-slate-800">
  <div id="root"></div>
  <script type="module" src="/main.tsx"></script>
</body>
</html>
